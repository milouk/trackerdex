server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Pre-compress JSON / JS / CSS hits — dex.json is big (~5MB raw) and
  # compresses to ~1MB.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    text/css
    text/plain;

  # Long cache for hashed assets, short cache for the SPA shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /dex.json {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
