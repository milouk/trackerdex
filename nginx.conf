server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Pre-compress JSON / JS / CSS hits — dex.json is big (~5MB raw) and
  # compresses to ~1MB.
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    text/css
    text/plain;

  # Long cache for hashed assets, short cache for the SPA shell.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /dex.json {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }

  # Reverse-proxy Pi-hole's REST API. The SPA hits its own origin for
  # /api/*, so the browser never makes a cross-origin request — no CORS
  # configuration needed on Pi-hole's side. Configure the upstream by
  # setting PIHOLE_UPSTREAM (default: 'pihole', resolved over the
  # container's docker network). On deploys without a Pi-hole container
  # on the same network, /api/* will 502 — expected and harmless for the
  # public demo (which uses synthetic data via the RUN OFFLINE button).
  location /api/ {
    proxy_pass http://pihole/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Pi-hole sessions can be longer-lived than nginx defaults; keep
    # connections open for streaming/long polling.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Runtime config (PIHOLE_HOST / PIHOLE_PASSWORD) — never cached so a
  # container restart with new env vars takes effect immediately.
  location = /config.json {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
